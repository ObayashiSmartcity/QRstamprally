<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易スタンプラリー</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f8f9fa; }
        .grid { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .stamp { width: 90px; height: 90px; border: 3px dashed #ccc; border-radius: 50%; line-height: 90px; color: #ccc; font-weight: bold; background: white; transition: all 0.3s; }
        .stamp.active { border: 3px solid #ff4757; color: #ff4757; background-color: #ffeaa7; transform: scale(1.1); }
        #message { font-weight: bold; color: #333; margin-top: 20px; min-height: 20px; }
        #progress-bar { margin-top: 15px; font-size: 14px; color: #666; }

        #reward-area {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            border-radius: 12px;
            animation: fadeIn 0.6s ease;
        }
        #reward-area h2 { margin: 0 0 10px; color: #e17055; }
        #reward-area p  { margin: 0 0 15px; color: #555; font-size: 14px; }
        .form-link-btn {
            display: inline-block;
            padding: 12px 28px;
            background-color: #0984e3;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }
        .form-link-btn:hover { background-color: #0652DD; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .clear-btn { margin-top: 50px; padding: 8px 16px; background-color: #e0e0e0; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🗺️ デジタルスタンプラリー</h1>
    <p id="message">QRコードをスキャンしてスタンプを集めよう！</p>
    <p id="progress-bar"></p>

    <div class="grid">
        <div id="spot1" class="stamp">スポット1</div>
        <div id="spot2" class="stamp">スポット2</div>
        <div id="spot3" class="stamp">スポット3</div>
    </div>

    <div id="reward-area">
        <h2>🎉 おめでとうございます！</h2>
        <p>スタンプが規定数に達しました！<br>下のボタンからアンケート（応募フォーム）にお進みください。</p>
        #
            📝 応募フォームへ進む
        </a>
    </div>

    <button class="clear-btn" onclick="resetStamps()">スタンプをリセットする</button>

    <script>
        const GOOGLE_FORM_BASE_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSfANqr-pSf8YsipbWxG2BcfpK0Ewu2GmLzGp9SPbitEzAIeEA/viewform?usp=pp_url';

        const FORM_ENTRY_IDS = {
            stamps: 'entry.1967784020',
            count: 'entry.775462935',
        };

        const ALL_SPOTS = ['spot1', 'spot2', 'spot3'];
        const REQUIRED_STAMPS = 3;
        const STORAGE_KEY = 'stamp_rally_progress_v2';

        let progress = {};
        try {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                progress = JSON.parse(savedData);
            }
        } catch (e) {
            console.error("データの読み込みに失敗しました", e);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const currentSpot = urlParams.get('spot');

        if (currentSpot && ALL_SPOTS.includes(currentSpot)) {
            progress[currentSpot] = true;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            document.getElementById('message').innerText = `「${currentSpot}」のスタンプをゲット！`;
        }

        let collectedCount = 0;
        const collectedSpots = [];

        ALL_SPOTS.forEach(spotId => {
            if (progress[spotId]) {
                collectedCount++;
                collectedSpots.push(spotId);
                const element = document.getElementById(spotId);
                if (element) {
                    element.classList.add('active');
                }
            }
        });

        document.getElementById('progress-bar').innerText =
            `スタンプ: ${collectedCount} / ${ALL_SPOTS.length}（達成まであと ${Math.max(0, REQUIRED_STAMPS - collectedCount)} 個）`;

        if (collectedCount >= REQUIRED_STAMPS) {
            document.getElementById('message').innerText = '🎊 全スタンプ達成！';
            document.getElementById('progress-bar').innerText =
                `スタンプ: ${collectedCount} / ${ALL_SPOTS.length}（達成！）`;

            const formUrl = GOOGLE_FORM_BASE_URL
                + `&${FORM_ENTRY_IDS.stamps}=${encodeURIComponent(collectedSpots.join(','))}`
                + `&${FORM_ENTRY_IDS.count}=${encodeURIComponent(collectedCount)}`;

            console.log('Generated Form URL:', formUrl);

            document.getElementById('form-link').href = formUrl;
            document.getElementById('reward-area').style.display = 'block';
        }

        function resetStamps() {
            if (confirm('スタンプをすべて消去して最初からやり直しますか？')) {
                localStorage.removeItem(STORAGE_KEY);
                window.location.href = window.location.pathname;
            }
        }
    </script>
</body>
</html>
